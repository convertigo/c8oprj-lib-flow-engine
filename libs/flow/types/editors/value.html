<template id="flow-value-editor-template">
	<style>
		:host { display: block; font: 12px system-ui, sans-serif; color: #e9eef2; }
		.layout { display: grid; grid-template-columns: minmax(280px, 1fr) minmax(260px, 0.9fr); gap: 10px; min-height: 360px; }
		input, textarea { box-sizing: border-box; width: 100%; border: 1px solid #48525c; background: #111417; color: #f2f6f8; border-radius: 4px; padding: 6px; font: 12px ui-monospace, monospace; }
		textarea { min-height: 180px; resize: vertical; }
		.modebar { display: flex; gap: 6px; margin-bottom: 8px; }
		.modebar button.active { background: #0d9ac2; border-color: #2bb8df; color: white; }
		.simple { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 8px; }
		.simple label { display: block; margin: 0; }
		.simpleLabel { display: block; margin-bottom: 3px; color: #9da7af; font-weight: 600; }
		.simple input[readonly] { background: #171a1d; color: #b8dff4; }
		.hidden { display: none !important; }
		.picker { overflow: auto; max-height: 420px; border: 1px solid #343b42; border-radius: 4px; padding: 8px; background: #171a1d; }
		details.scopeGroup { margin: 6px 0; }
		details.scopeGroup > summary { cursor: pointer; font-weight: 700; padding: 4px 0; color: #f2f6f8; }
		button { border: 1px solid #2786a8; background: #12647e; color: white; border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; }
		.path { display: block; width: 100%; text-align: left; margin: 0 0 4px; padding: 4px 6px; border-color: #39424a; background: #22282e; color: #d7e1e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
		.path:hover { border-color: #2786a8; color: white; }
		.type { color: #85c8ff; }
		.hint, .empty { color: #9da7af; margin: 6px 0 0; line-height: 1.35; }
	</style>
	<div class="layout">
		<div>
			<div class="modebar">
				<button data-mode="simple">Simple</button>
				<button data-mode="custom">Custom</button>
			</div>
			<div class="simple" part="simple">
				<label>
					<span class="simpleLabel">Prefix</span>
					<input data-simple="prefix" placeholder="expression prefix">
				</label>
				<label>
					<span class="simpleLabel">Pick</span>
					<input data-simple="pick" placeholder="select a scope path" readonly>
				</label>
				<label>
					<span class="simpleLabel">Suffix</span>
					<input data-simple="suffix" placeholder="expression suffix">
				</label>
			</div>
			<textarea part="input" spellcheck="false"></textarea>
			<div class="hint">Prefix, pick and suffix are concatenated inside {{ expression }} to keep the native value type.</div>
		</div>
		<div class="picker" part="picker"></div>
	</div>
</template>
<script>
	(function () {
		if (customElements.get("flow-value-editor")) {
			return;
		}

		function esc(value) {
			return String(value == null ? "" : value).replace(/[&<>"']/g, function (c) {
				return { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c];
			});
		}

		function groups(context) {
			var scopes = context && context.scopes || {};
			return Object.keys(scopes).map(function (scope) {
				var bucket = scopes[scope];
				return {
					scope: scope,
					paths: Array.isArray(bucket) ? bucket : bucket && bucket.paths || []
				};
			});
		}

		function targetType(propertyDefinition) {
			var type = propertyDefinition && (propertyDefinition.type || propertyDefinition.kind);
			return String(type || "unknown").toLowerCase();
		}

		function isScalarType(type) {
			return type === "string" || type === "number" || type === "integer" || type === "boolean";
		}

		function entryType(entry) {
			return typeof entry === "string" ? "unknown" : String(entry.type || "unknown").toLowerCase();
		}

		function acceptsPath(propertyDefinition, entry) {
			var wanted = targetType(propertyDefinition);
			if (!wanted || wanted === "unknown") {
				return true;
			}
			var actual = entryType(entry);
			if (isScalarType(wanted) && (actual === "object" || actual === "array")) {
				return false;
			}
			if (wanted === "array" && actual === "object") {
				return false;
			}
			if (wanted === "object" && actual === "array") {
				return false;
			}
			return true;
		}

		function renderPicker(context, propertyDefinition) {
			var html = "";
			groups(context).forEach(function (group) {
				var rows = (group.paths || []).filter(function (entry) {
					return acceptsPath(propertyDefinition, entry);
				});
				if (rows.length === 0) {
					return;
				}
				html += "<details class=\"scopeGroup\"><summary>" + esc(group.scope)
					+ " <span class=\"type\">" + rows.length + "</span></summary>";
				rows.forEach(function (entry) {
					var path = typeof entry === "string" ? entry : entry.path;
					var type = typeof entry === "string" ? "" : entry.type || "";
					html += "<button class=\"path\" data-path=\"" + esc(path) + "\">" + esc(path)
						+ (type ? " <span class=\"type\">" + esc(type) + "</span>" : "") + "</button>";
				});
				html += "</details>";
			});
			return html || "<div class=\"empty\">No known path yet.</div>";
		}

		function parts(value) {
			value = String(value || "");
			var match = value.match(/^\s*\{\{([\s\S]*)\}\}\s*$/);
			if (match) {
				return { prefix: "", path: match[1].trim(), suffix: "" };
			}
			return { prefix: "", path: "", suffix: "" };
		}

		function canUseSimple(value) {
			return String(value || "").trim() === "" || parts(value).path !== "";
		}

		customElements.define("flow-value-editor", class extends HTMLElement {
			constructor() {
				super();
				this._state = {};
				this._value = "";
				this._mode = "custom";
			}

			connectedCallback() {
				if (!this.shadowRoot) {
					this.attachShadow({ mode: "open" })
						.append(document.getElementById("flow-value-editor-template").content.cloneNode(true));
					this.shadowRoot.addEventListener("input", this);
					this.shadowRoot.addEventListener("click", this);
				}
				this.render();
			}

			setState(state) {
				this._state = state || {};
				if ((!this._state.context || !this._state.context.scopes) && this.flowHost && this.flowHost.request) {
					var response = this.flowHost.request("context", {});
					if (response && response.ok && response.context) {
						this._state.context = response.context;
					}
				}
				this._value = this._state.value == null ? "" : String(this._state.value);
				this._mode = canUseSimple(this._value) ? "simple" : "custom";
				this.render();
				this.emit();
			}

			get value() {
				return this._value || "";
			}

			handleEvent(event) {
				if (event.type === "input") {
					if (event.target && event.target.matches("[data-simple]")) {
						this.syncSimple();
					} else if (event.target && event.target.matches("textarea")) {
						this._value = event.target.value;
						this.emit();
					}
					return;
				}
				if (event.type === "click") {
					var mode = event.target && event.target.getAttribute && event.target.getAttribute("data-mode");
					if (mode) {
						this._mode = mode;
						if (mode === "simple") {
							this.syncSimple();
						}
						this.render();
						return;
					}
					var button = event.target && event.target.closest && event.target.closest("button[data-path]");
					if (button) {
						this.pick(button.getAttribute("data-path") || "");
					}
				}
			}

			syncSimple() {
				var prefix = this.shadowRoot.querySelector("[data-simple=prefix]");
				var pick = this.shadowRoot.querySelector("[data-simple=pick]");
				var suffix = this.shadowRoot.querySelector("[data-simple=suffix]");
				var path = pick && pick.value.trim();
				var expression = ((prefix ? prefix.value : "") + (path || "") + (suffix ? suffix.value : "")).trim();
				this._value = expression ? "{{ " + expression + " }}" : "";
				this.emit();
			}

			pick(path) {
				if (this._mode === "simple") {
					var pick = this.shadowRoot.querySelector("[data-simple=pick]");
					if (pick) {
						pick.value = path;
					}
					this.syncSimple();
					this.render();
					return;
				}
				var textarea = this.shadowRoot.querySelector("textarea");
				var text = "{{ " + path + " }}";
				var start = textarea.selectionStart || 0;
				var end = textarea.selectionEnd || start;
				this._value = textarea.value.slice(0, start) + text + textarea.value.slice(end);
				this.render();
				textarea.focus();
				textarea.selectionStart = textarea.selectionEnd = start + text.length;
				this.emit();
			}

			emit() {
				this.dispatchEvent(new CustomEvent("flow-value", {
					bubbles: true,
					detail: { value: this.value }
				}));
			}

			render() {
				if (!this.shadowRoot) {
					return;
				}
				var p = parts(this._value);
				var simple = this.shadowRoot.querySelector(".simple");
				var textarea = this.shadowRoot.querySelector("textarea");
				this.shadowRoot.querySelectorAll("[data-mode]").forEach(function (button) {
					button.classList.toggle("active", button.getAttribute("data-mode") === this._mode);
				}, this);
				if (simple) {
					simple.classList.toggle("hidden", this._mode !== "simple");
				}
				if (textarea) {
					textarea.classList.toggle("hidden", this._mode === "simple");
					if (textarea.value !== this._value) {
						textarea.value = this._value;
					}
				}
				var prefix = this.shadowRoot.querySelector("[data-simple=prefix]");
				var pick = this.shadowRoot.querySelector("[data-simple=pick]");
				var suffix = this.shadowRoot.querySelector("[data-simple=suffix]");
				if (prefix && prefix.value !== p.prefix) prefix.value = p.prefix;
				if (pick && pick.value !== p.path) pick.value = p.path;
				if (suffix && suffix.value !== p.suffix) suffix.value = p.suffix;
				var picker = this.shadowRoot.querySelector(".picker");
				if (picker) {
					picker.innerHTML = renderPicker(this._state.context, this._state.propertyDefinition);
				}
			}
		});
	}());
</script>
