<template id="flow-requestable-editor-template">
	<style>
		:host { display: block; font: 12px system-ui, sans-serif; color: #e9eef2; }
		.layout { display: grid; grid-template-columns: minmax(220px, 1fr) minmax(260px, 0.9fr); gap: 10px; min-height: 320px; }
		input { box-sizing: border-box; width: 100%; border: 1px solid #48525c; background: #111417; color: #f2f6f8; border-radius: 4px; padding: 6px; font: 12px ui-monospace, monospace; }
		.tree { overflow: auto; max-height: 420px; border: 1px solid #343b42; border-radius: 4px; padding: 8px; background: #171a1d; }
		.type { color: #85c8ff; font-weight: 400; }
		details { margin: 4px 0; }
		summary { cursor: pointer; color: #dce7ed; font-weight: 600; }
		.children { margin-left: 12px; padding-left: 8px; border-left: 1px solid #343b42; }
		button { display: block; width: 100%; text-align: left; margin: 0 0 4px; padding: 4px 6px; border: 1px solid #39424a; border-radius: 4px; background: #22282e; color: #d7e1e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
		button:hover { border-color: #2786a8; color: white; }
		button.selected { border-color: #48d8ff; background: #0b7592; color: white; box-shadow: inset 3px 0 0 #8eeaff; font-weight: 700; }
		.empty { color: #9da7af; padding: 8px; }
		.hint { color: #9da7af; margin: 6px 0 0; line-height: 1.35; }
	</style>
	<div class="layout">
		<div>
			<input part="input" spellcheck="false" placeholder="Project.Sequence">
			<div class="hint">Pick a sequence, flow or transaction from the tree.</div>
		</div>
		<div class="tree" part="tree"></div>
	</div>
</template>
<script>
	(function () {
		if (customElements.get("flow-requestable-editor")) {
			return;
		}

		function esc(value) {
			return String(value == null ? "" : value).replace(/[&<>"']/g, function (c) {
				return { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c];
			});
		}

		function relativeQName(qname, currentProject) {
			qname = String(qname || "");
			currentProject = String(currentProject || "");
			if (currentProject && qname.indexOf(currentProject + ".") === 0) {
				return "." + qname.substring(currentProject.length + 1);
			}
			return qname;
		}

		function sameRequestable(left, right, currentProject) {
			left = relativeQName(left, currentProject);
			right = relativeQName(right, currentProject);
			return String(left || "") === String(right || "");
		}

		function renderTree(items, currentProject, selectedValue) {
			var html = "";
			(items || []).forEach(function (item) {
				if (!item) {
					return;
				}
				if (item.kind === "project" || item.kind === "connector") {
					var nextCurrentProject = item.kind === "project" && item.current ? String(item.name || item.qname || "") : currentProject;
					var children = renderTree(item.children, nextCurrentProject, selectedValue);
					var open = children.indexOf("selected") !== -1 || item.current;
					html += "<details" + (open ? " open" : "") + "><summary>" + esc(item.name || item.qname || "")
						+ " <span class=\"type\">" + esc(item.kind || "") + (item.current ? ", current" : "") + "</span></summary>"
						+ "<div class=\"children\">" + children + "</div></details>";
					return;
				}
				var value = relativeQName(item.qname, currentProject);
				var selected = sameRequestable(value, selectedValue, currentProject);
				html += "<button class=\"" + (selected ? "selected" : "") + "\" data-qname=\"" + esc(value) + "\" title=\"" + esc(item.qname) + "\">" + esc(item.name || item.qname)
					+ " <span class=\"type\">" + esc(item.kind || "") + "</span></button>";
			});
			return html || "<div class=\"empty\">No requestable available.</div>";
		}

		customElements.define("flow-requestable-editor", class extends HTMLElement {
			constructor() {
				super();
				this._value = "";
				this._state = {};
			}

			connectedCallback() {
				if (!this.shadowRoot) {
					this.attachShadow({ mode: "open" })
						.append(document.getElementById("flow-requestable-editor-template").content.cloneNode(true));
					this.shadowRoot.addEventListener("input", this);
					this.shadowRoot.addEventListener("click", this);
				}
				this.render();
			}

			setState(state) {
				this._state = state || {};
				if ((!this._state.requestables || !this._state.requestables.projects) && this.flowHost && this.flowHost.request) {
					var response = this.flowHost.request("requestables", {});
					if (response && response.ok && response.requestables) {
						this._state.requestables = response.requestables;
					}
				}
				this.value = this._state.value == null ? "" : String(this._state.value);
				this.render();
			}

			get value() {
				return this._value || "";
			}

			set value(value) {
				this._value = value == null ? "" : String(value);
				var input = this.shadowRoot && this.shadowRoot.querySelector("input");
				if (input && input.value !== this._value) {
					input.value = this._value;
				}
			}

			handleEvent(event) {
				if (event.type === "input" && event.target && event.target.matches("input")) {
					this._value = event.target.value;
					this.emit();
					return;
				}
				if (event.type === "click") {
					var button = event.target && event.target.closest && event.target.closest("button[data-qname]");
					if (!button) {
						return;
					}
					this.value = button.getAttribute("data-qname") || "";
					this.render();
					this.emit();
				}
			}

			emit() {
				this.dispatchEvent(new CustomEvent("flow-value", {
					bubbles: true,
					detail: { value: this.value }
				}));
			}

			render() {
				if (!this.shadowRoot) {
					return;
				}
				var input = this.shadowRoot.querySelector("input");
				if (input && input.value !== this.value) {
					input.value = this.value;
				}
				var tree = this.shadowRoot.querySelector(".tree");
				if (tree) {
					var projects = this._state.requestables && this._state.requestables.projects || [];
					tree.innerHTML = renderTree(projects, "", this.value);
					var selected = tree.querySelector("button.selected");
					if (selected) {
						setTimeout(function () {
							selected.scrollIntoView({ block: "center", inline: "nearest" });
						}, 0);
					}
				}
			}
		});
	}());
</script>
