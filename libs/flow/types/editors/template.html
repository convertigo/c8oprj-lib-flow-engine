<template id="flow-template-editor">
	<style>
		:host { display: block; font: 12px system-ui, sans-serif; }
		textarea { box-sizing: border-box; width: 100%; min-height: 120px; font: 12px ui-monospace, monospace; }
	</style>
	<textarea part="input" spellcheck="false"></textarea>
</template>
<script>
	if (!customElements.get("flow-template-editor")) customElements.define("flow-template-editor", class extends HTMLElement {
		connectedCallback() {
			if (!this.shadowRoot) {
				this.attachShadow({ mode: "open" }).append(document.getElementById("flow-template-editor").content.cloneNode(true));
			}
		}
	});
</script>
