<template id="flow-path-editor-template">
	<style>
		:host { display: block; font: 12px system-ui, sans-serif; color: #e9eef2; }
		.layout { display: grid; grid-template-columns: minmax(220px, 1fr) minmax(260px, 0.9fr); gap: 10px; min-height: 320px; }
		input { box-sizing: border-box; width: 100%; border: 1px solid #48525c; background: #111417; color: #f2f6f8; border-radius: 4px; padding: 6px; font: 12px ui-monospace, monospace; }
		.picker { overflow: auto; max-height: 420px; border: 1px solid #343b42; border-radius: 4px; padding: 8px; background: #171a1d; }
		.group { font-weight: 700; margin: 8px 0 6px; color: #f2f6f8; }
		button { display: block; width: 100%; text-align: left; margin: 0 0 4px; padding: 4px 6px; border: 1px solid #39424a; border-radius: 4px; background: #22282e; color: #d7e1e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
		button:hover { border-color: #2786a8; color: white; }
		button.selected { border-color: #2bb8df; background: #0d5268; color: white; }
		.type { color: #85c8ff; }
		.hint, .empty { color: #9da7af; margin: 6px 0 0; line-height: 1.35; }
	</style>
	<div class="layout">
		<div>
			<input part="input" spellcheck="false" placeholder="result.value">
			<div class="hint">Pick a known scope path or type a target path.</div>
		</div>
		<div class="picker" part="picker"></div>
	</div>
</template>
<script>
	(function () {
		if (customElements.get("flow-path-editor")) {
			return;
		}

		function esc(value) {
			return String(value == null ? "" : value).replace(/[&<>"']/g, function (c) {
				return { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c];
			});
		}

		function groups(context) {
			var scopes = context && context.scopes || {};
			return Object.keys(scopes).map(function (scope) {
				var bucket = scopes[scope];
				return {
					scope: scope,
					paths: Array.isArray(bucket) ? bucket : bucket && bucket.paths || []
				};
			});
		}

		function pathOf(entry) {
			return typeof entry === "string" ? entry : entry && entry.path || "";
		}

		function typeOf(entry) {
			return typeof entry === "string" ? "" : entry && entry.type || "";
		}

		function objectPathParts(path) {
			var parts = [];
			var text = String(path || "");
			var part = "";
			var i = 0;
			function pushPart() {
				if (part !== "") {
					parts.push(part);
					part = "";
				}
			}
			while (i < text.length) {
				var ch = text.charAt(i);
				if (ch === ".") {
					pushPart();
					i++;
					continue;
				}
				if (ch === "[") {
					pushPart();
					i++;
					while (i < text.length && /\s/.test(text.charAt(i))) i++;
					var bracket = "";
					ch = text.charAt(i);
					if (ch === "\"" || ch === "'") {
						var quote = ch;
						i++;
						while (i < text.length) {
							ch = text.charAt(i++);
							if (ch === quote) break;
							if (ch === "\\" && i < text.length) bracket += text.charAt(i++);
							else bracket += ch;
						}
					} else {
						while (i < text.length && text.charAt(i) !== "]") {
							bracket += text.charAt(i++);
						}
						bracket = bracket.trim();
					}
					while (i < text.length && text.charAt(i) !== "]") i++;
					if (text.charAt(i) === "]") i++;
					if (bracket !== "") parts.push(bracket);
					continue;
				}
				part += ch;
				i++;
			}
			pushPart();
			return parts;
		}

		function dotPath(path) {
			return objectPathParts(path).join(".");
		}

		function bracketPath(parts, arrayPaths) {
			var out = "";
			var current = "";
			parts.forEach(function (part) {
				if (/^\d+$/.test(part)) {
					out += "[" + part + "]";
					current += "." + part;
					return;
				}
				if (!out) {
					out = part;
					current = part;
					return;
				}
				var parentIsArray = arrayPaths && arrayPaths[current] === true;
				out += parentIsArray ? "[0]." + part : "." + part;
				current += parentIsArray ? ".0." + part : "." + part;
			});
			return out;
		}

		function sourceBase(state) {
			var def = state && state.propertyDefinition || {};
			var sourceKey = def.sourceProperty || def.relativeTo || "";
			var value = sourceKey && state && state.definition ? state.definition[sourceKey] : "";
			value = String(value || "").trim();
			var exact = value.match(/^\s*\{\{\s*([^}]+?)\s*\}\}\s*$/);
			return exact ? exact[1].trim() : value;
		}

		function startsWithParts(parts, prefix) {
			if (!prefix.length || parts.length < prefix.length) {
				return false;
			}
			for (var i = 0; i < prefix.length; i++) {
				if (parts[i] !== prefix[i]) {
					return false;
				}
			}
			return true;
		}

		function arrayPathMap(context) {
			var out = {};
			groups(context).forEach(function (group) {
				(group.paths || []).forEach(function (entry) {
					if (String(typeOf(entry)).toLowerCase() === "array") {
						out[dotPath(pathOf(entry))] = true;
					}
				});
			});
			return out;
		}

		function pickerEntry(entry, state, arrays) {
			var fullPath = pathOf(entry);
			var fullParts = objectPathParts(fullPath);
			var base = sourceBase(state);
			var baseParts = objectPathParts(base);
			var valueParts = fullParts;
			var value = fullPath;
			var arraysForDisplay = arrays;
			if (base && startsWithParts(fullParts, baseParts)) {
				valueParts = fullParts.slice(baseParts.length);
				value = bracketPath(valueParts, Object.keys(arrays).reduce(function (out, key) {
					var parts = objectPathParts(key);
					if (startsWithParts(parts, baseParts)) {
						out[parts.slice(baseParts.length).join(".")] = true;
					}
					return out;
				}, {}));
			} else if (base) {
				value = "";
			} else if (!base) {
				value = bracketPath(valueParts, arraysForDisplay);
			}
			return {
				fullPath: fullPath,
				value: value,
				type: typeOf(entry)
			};
		}

		function renderPicker(state) {
			var context = state && state.context || {};
			var selected = dotPath(state && state.value || "");
			var arrays = arrayPathMap(context);
			var html = "";
			groups(context).forEach(function (group) {
				var rows = (group.paths || []).map(function (entry) {
					return pickerEntry(entry, state, arrays);
				}).filter(function (row) {
					return row.value !== "";
				});
				if (rows.length === 0) {
					return;
				}
				html += "<div class=\"group\">" + esc(group.scope) + "</div>";
				rows.forEach(function (row) {
					var isSelected = dotPath(row.value) === selected;
					html += "<button class=\"" + (isSelected ? "selected" : "") + "\" data-path=\"" + esc(row.value) + "\">" + esc(row.value)
						+ (row.type ? " <span class=\"type\">" + esc(row.type) + "</span>" : "") + "</button>";
				});
			});
			return html || "<div class=\"empty\">No known path yet.</div>";
		}

		customElements.define("flow-path-editor", class extends HTMLElement {
			constructor() {
				super();
				this._state = {};
				this._value = "";
			}

			connectedCallback() {
				if (!this.shadowRoot) {
					this.attachShadow({ mode: "open" })
						.append(document.getElementById("flow-path-editor-template").content.cloneNode(true));
					this.shadowRoot.addEventListener("input", this);
					this.shadowRoot.addEventListener("click", this);
				}
				this.render();
			}

			setState(state) {
				this._state = state || {};
				if ((!this._state.context || !this._state.context.scopes) && this.flowHost && this.flowHost.request) {
					var response = this.flowHost.request("context", {});
					if (response && response.ok && response.context) {
						this._state.context = response.context;
					}
				}
				this.value = this._state.value == null ? "" : bracketPath(objectPathParts(this._state.value), {});
				this.render();
			}

			get value() {
				return this._value || "";
			}

			set value(value) {
				this._value = value == null ? "" : String(value);
				var input = this.shadowRoot && this.shadowRoot.querySelector("input");
				if (input && input.value !== this._value) {
					input.value = this._value;
				}
			}

			handleEvent(event) {
				if (event.type === "input" && event.target && event.target.matches("input")) {
					this._value = event.target.value;
					this.emit();
					return;
				}
				if (event.type === "click") {
					var button = event.target && event.target.closest && event.target.closest("button[data-path]");
					if (!button) {
						return;
					}
					this.value = button.getAttribute("data-path") || "";
					this.emit();
				}
			}

			emit() {
				this.dispatchEvent(new CustomEvent("flow-value", {
					bubbles: true,
					detail: { value: this.value }
				}));
			}

			render() {
				if (!this.shadowRoot) {
					return;
				}
				var input = this.shadowRoot.querySelector("input");
				if (input && input.value !== this.value) {
					input.value = this.value;
				}
				var picker = this.shadowRoot.querySelector(".picker");
				if (picker) {
					picker.innerHTML = renderPicker(this._state);
					var selected = picker.querySelector("button.selected");
					if (selected) {
						setTimeout(function () {
							selected.scrollIntoView({ block: "center", inline: "nearest" });
						}, 0);
					}
				}
			}
		});
	}());
</script>
