version: 1
icon: "mdi:code-json"
description: "Serializes a native value as JSON text."
props:
  value:
    label: "value"
    kind: "value"
    type: "unknown"
    default: "{{ flow.value }}"
    description: "Value to serialize as JSON."
  pretty:
    label: "pretty"
    kind: "literal"
    type: "boolean"
    default: false
    description: "Write indented JSON when true."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    default: "flow.text"
    description: "Scope path receiving the JSON text."
hooks:
  file: "json.stringify.hooks.js"
implementation:
  runtime: "rhino"
  file: "json.stringify.js"
