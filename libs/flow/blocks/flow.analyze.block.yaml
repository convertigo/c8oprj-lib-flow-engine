version: 1
private: true
icon: "mdi:chart-timeline-variant"
description: "Analyzes a Flow source or definition without running it: node order, reads, writes, sources and inferred scope paths."
props:
  flowSource:
    label: "flowSource"
    kind: "text"
    type: "string"
    description: "Flow YAML source to analyze."
  definition:
    label: "definition"
    kind: "literal"
    type: "object"
    description: "Flow definition object to analyze."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving reads, writes and nodes."
hooks:
  file: "flow.analyze.hooks.js"
implementation:
  runtime: "rhino"
  file: "flow.analyze.js"
