version: 1
name: "type.create"
private: true
icon: "mdi:shape-plus-outline"
package: "core"
namespace: "type"
description: "Creates one project-local Flow property type."
props:
  name:
    label: "name"
    kind: "text"
    type: "string"
    description: "Project-local Flow property type name."
  source:
    label: "source"
    kind: "text"
    type: "string"
    description: "Replacement Rhino ES6 JavaScript type source."
  overwrite:
    label: "overwrite"
    kind: "literal"
    type: "boolean"
    description: "Allow replacing an existing project-local type."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving creation result."
implementation:
  runtime: "rhino"
  file: "type.create.js"
