version: 1
private: true
icon: "mdi:shape-plus-outline"
description: "Creates one project-local Flow property type."
props:
  name:
    label: "name"
    kind: "text"
    type: "string"
    description: "Project-local Flow property type name."
  descriptorSource:
    label: "descriptorSource"
    kind: "text"
    type: "string"
    description: "Flow property type descriptor YAML source."
  overwrite:
    label: "overwrite"
    kind: "literal"
    type: "boolean"
    description: "Allow replacing an existing project-local type."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving creation result."
hooks:
  file: "type.create.hooks.js"
implementation:
  runtime: "rhino"
  file: "type.create.js"
