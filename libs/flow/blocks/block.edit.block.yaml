version: 1
private: true
icon: "mdi:puzzle-edit-outline"
description: "Edits one project-local Flow block descriptor and/or implementation. Rhino code should stay a small primitive; HTTP and Convertigo requestable calls belong in visible FlowScript nodes."
props:
  name:
    label: "name"
    kind: "text"
    type: "string"
    description: "Project-local Flow block name."
  implementationSource:
    label: "implementationSource"
    kind: "text"
    type: "string"
    description: "Replacement implementation source. Use Flow YAML for runtime=flow or small focused Rhino ES6 source for runtime=rhino. Rhino must not perform HTTP or requestable calls directly."
  descriptorSource:
    label: "descriptorSource"
    kind: "text"
    type: "string"
    description: "Optional replacement canonical *.block.yaml descriptor source."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving edit result."
hooks:
  file: "block.edit.hooks.js"
implementation:
  runtime: "rhino"
  file: "block.edit.js"
