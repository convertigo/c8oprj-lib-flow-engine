version: 1
icon: "mdi:web"
description: "Calls an HTTP endpoint with GET."
props:
  url:
    kind: "template"
    type: "string"
    default: ""
    description: "HTTP URL template to call."
  headers:
    kind: "template"
    type: "object"
    description: "Optional HTTP headers object."
  out:
    kind: "path"
    mode: "write"
    default: "local.response"
    description: "Scope path receiving status, contentType, body and text."
outputs:
  out:
    type: "object"
    properties:
      status:
        type: "integer"
      contentType:
        type: "string"
      body:
        type: "unknown"
      text:
        type: "string"
hooks:
  file: "http.get.hooks.js"
implementation:
  runtime: "rhino"
  file: "http.get.js"
