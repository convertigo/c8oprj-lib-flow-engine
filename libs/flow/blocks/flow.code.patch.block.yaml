version: 1
private: true
icon: "mdi:file-edit-outline"
tags:
- flow
- code
- flowscript
- patch
description: "Applies a revision-checked FlowScript patch or replacement."
props:
  qname:
    label: "qname"
    kind: "text"
    type: "string"
    description: "Flow qname, for example Project.FlowName."
  name:
    label: "name"
    kind: "text"
    type: "string"
    description: "Project-local Flow name."
  revision:
    label: "revision"
    kind: "text"
    type: "string"
    description: "Revision returned by flow.code.get."
  code:
    label: "code"
    kind: "text"
    type: "string"
    description: "Full replacement FlowScript code."
  codepatch:
    label: "codepatch"
    kind: "text"
    type: "string"
    description: "Unified diff applied to the current FlowScript code."
  dry:
    label: "dry"
    kind: "literal"
    type: "boolean"
    default: false
    description: "Validate without writing."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving compact patch result."
hooks:
  file: "flow.code.patch.hooks.js"
implementation:
  runtime: "rhino"
  file: "flow.code.patch.js"
