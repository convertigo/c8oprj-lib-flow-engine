version: 1
private: true
icon: "mdi:play-circle-outline"
description: "Runs a Flow source or definition."
props:
  flowSource:
    label: "flowSource"
    kind: "text"
    type: "string"
    description: "Flow YAML source to run."
  definition:
    label: "definition"
    kind: "literal"
    type: "object"
    description: "Flow definition object to run."
  input:
    label: "input"
    kind: "template"
    type: "object"
    description: "Input scope."
  config:
    label: "config"
    kind: "template"
    type: "object"
    description: "Config scope override."
  includeFlow:
    label: "includeFlow"
    kind: "literal"
    type: "boolean"
    description: "Include final flow scope in the response."
  includeTrace:
    label: "includeTrace"
    kind: "literal"
    type: "boolean"
    description: "Include execution trace in the response."
  includeFullTrace:
    label: "includeFullTrace"
    kind: "literal"
    type: "boolean"
    description: "MCP authoring hint: return full per-node trace values instead of a compact preview."
  includeFullResult:
    label: "includeFullResult"
    kind: "literal"
    type: "boolean"
    description: "MCP authoring hint: return full result only while it stays below maxResultChars."
  allowHugeResult:
    label: "allowHugeResult"
    kind: "literal"
    type: "boolean"
    default: false
    description: "Explicitly allow returning a result larger than maxResultChars. Use rarely."
  maxResultChars:
    label: "maxResultChars"
    kind: "literal"
    type: "number"
    description: "MCP authoring hint: compact result payloads larger than this JSON size."
  maxArrayItems:
    label: "maxArrayItems"
    kind: "literal"
    type: "number"
    description: "MCP authoring hint: number of leading array items kept in compact previews."
  maxTraceChars:
    label: "maxTraceChars"
    kind: "literal"
    type: "number"
    description: "MCP authoring hint: compact trace payloads larger than this JSON size."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving execution result."
hooks:
  file: "flow.run.hooks.js"
implementation:
  runtime: "rhino"
  file: "flow.run.js"
