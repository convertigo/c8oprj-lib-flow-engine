version: 1
name: "flow.run"
private: true
icon: "mdi:play-circle-outline"
package: "core"
namespace: "flow"
description: "Runs a Flow source or definition."
props:
  flowSource:
    label: "flowSource"
    kind: "text"
    type: "string"
    description: "Flow YAML source to run."
  definition:
    label: "definition"
    kind: "literal"
    type: "object"
    description: "Flow definition object to run."
  input:
    label: "input"
    kind: "template"
    type: "object"
    description: "Input scope."
  config:
    label: "config"
    kind: "template"
    type: "object"
    description: "Config scope override."
  includeFlow:
    label: "includeFlow"
    kind: "literal"
    type: "boolean"
    description: "Include final flow scope in the response."
  includeTrace:
    label: "includeTrace"
    kind: "literal"
    type: "boolean"
    description: "Include execution trace in the response."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving execution result."
implementation:
  runtime: "rhino"
  file: "flow.run.js"
