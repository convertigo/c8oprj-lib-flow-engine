version: 1
name: "type.get"
private: true
icon: "mdi:shape-outline"
package: "core"
namespace: "type"
description: "Reads one Flow property type descriptor."
props:
  name:
    label: "name"
    kind: "text"
    type: "string"
    description: "Flow property type name."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving type descriptor source and descriptor."
hooks:
  file: "type.get.hooks.js"
implementation:
  runtime: "rhino"
  file: "type.get.js"
