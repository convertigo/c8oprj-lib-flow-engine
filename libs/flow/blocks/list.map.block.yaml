version: 1
icon: "mdi:vector-polyline"
description: "Maps an array to a new array while exposing each item as current."
props:
  items:
    label: "items"
    kind: "expression"
    type: "array"
    default: "local.items"
    description: "Array expression to map."
  select:
    label: "select"
    kind: "expression"
    type: "unknown"
    default: "current"
    description: "Expression evaluated for each current item."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    default: "local.mapped"
    description: "Scope path receiving the mapped array."
hooks:
  file: "list.map.hooks.js"
implementation:
  runtime: "rhino"
  file: "list.map.js"
