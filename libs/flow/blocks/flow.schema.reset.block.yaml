version: 1
name: "flow.schema.reset"
private: true
icon: "mdi:database-refresh-outline"
package: "core"
namespace: "flow"
description: "Deletes learned Flow schema files so the next run learns them again."
props:
  flowName:
    label: "flowName"
    kind: "text"
    type: "string"
    description: "Flow sidecar name."
  name:
    label: "name"
    kind: "text"
    type: "string"
    description: "Alias for flowName."
  node:
    label: "node"
    kind: "text"
    type: "string"
    description: "Optional node id."
  property:
    label: "property"
    kind: "text"
    type: "string"
    description: "Optional output property."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving reset status."
implementation:
  runtime: "rhino"
  file: "flow.schema.reset.js"
