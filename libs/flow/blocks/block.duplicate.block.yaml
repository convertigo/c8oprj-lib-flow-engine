version: 1
private: true
icon: "mdi:content-duplicate"
description: "Duplicates one Flow block into a project-local block."
props:
  fromName:
    label: "fromName"
    kind: "text"
    type: "string"
    description: "Source block name."
  toName:
    label: "toName"
    kind: "text"
    type: "string"
    description: "Project-local destination block name."
  overwrite:
    label: "overwrite"
    kind: "literal"
    type: "boolean"
    description: "Allow replacing an existing project-local block."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving duplicate result."
hooks:
  file: "block.duplicate.hooks.js"
implementation:
  runtime: "rhino"
  file: "block.duplicate.js"
