version: 1
name: "file.withWriter"
icon: "mdi:file-edit-outline"
kind: "resource"
description: "Opens a file writer handle, runs child nodes, then closes it."
props:
  path:
    label: "path"
    kind: "template"
    type: "string"
    description: "File path. Relative paths resolve from the current project directory."
  file:
    label: "file"
    kind: "template"
    type: "string"
    description: "Alias for path."
  append:
    label: "append"
    kind: "literal"
    type: "boolean"
    default: false
    description: "Append to the file instead of replacing it."
  charset:
    label: "charset"
    kind: "text"
    type: "string"
    default: "UTF-8"
    description: "Writer charset."
  as:
    label: "as"
    kind: "path"
    mode: "write"
    default: "local.writer"
    type: "handle<file.writer>"
    description: "Scope path receiving the writer handle while child nodes run."
children:
  - "nodes"
slots:
  - name: "nodes"
    label: "Flow"
    inline: true
hooks:
  file: "file.withWriter.hooks.js"
implementation:
  runtime: "rhino"
  file: "file.withWriter.js"
