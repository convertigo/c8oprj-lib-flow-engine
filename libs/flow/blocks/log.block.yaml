version: 1
icon: "mdi:console"
description: "Writes a diagnostic message to a Convertigo logger."
props:
  level:
    label: "level"
    kind: "text"
    type: "string"
    default: "info"
    description: "Log level: error, warn, info, debug or trace."
  logger:
    label: "logger"
    kind: "text"
    type: "string"
    default: "context"
    description: "Convertigo logger: context, engine, user, audit or beans."
  message:
    label: "message"
    kind: "template"
    type: "string"
    default: ""
    description: "Message template to write."
  data:
    label: "data"
    kind: "value"
    type: "unknown"
    description: "Optional structured value appended as JSON."
hooks:
  file: "log.hooks.js"
implementation:
  runtime: "rhino"
  file: "log.js"
