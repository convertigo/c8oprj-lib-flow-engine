version: 1
private: true
icon: "mdi:puzzle-plus-outline"
description: "Creates one project-local canonical Flow block."
props:
  name:
    label: "name"
    kind: "text"
    type: "string"
    description: "Project-local Flow block name."
  implementationSource:
    label: "implementationSource"
    kind: "text"
    type: "string"
    description: "Implementation source. Use Flow YAML for runtime=flow or Rhino ES6 source for runtime=rhino."
  descriptorSource:
    label: "descriptorSource"
    kind: "text"
    type: "string"
    description: "Optional canonical *.block.yaml descriptor source."
  overwrite:
    label: "overwrite"
    kind: "literal"
    type: "boolean"
    description: "Allow replacing an existing project-local block."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving creation result."
hooks:
  file: "block.create.hooks.js"
implementation:
  runtime: "rhino"
  file: "block.create.js"
