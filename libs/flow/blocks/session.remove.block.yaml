version: 1
name: "session.remove"
icon: "mdi:trash-can-outline"
description: "Removes a value from the current HTTP session."
props:
  key:
    label: "key"
    kind: "template"
    type: "string"
    default: ""
    description: "HTTP session attribute name to remove."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Optional scope path receiving true when the key was removed."
hooks:
  file: "session.remove.hooks.js"
implementation:
  runtime: "rhino"
  file: "session.remove.js"
