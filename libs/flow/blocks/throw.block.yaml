version: 1
icon: "mdi:alert-circle-outline"
description: "Stops the Flow with a structured error."
props:
  code:
    kind: "text"
    type: "string"
    default: "FLOW_THROW"
    description: "Structured error code."
  message:
    kind: "template"
    type: "string"
    default: "Flow error"
    description: "Error message template."
  status:
    kind: "expression"
    type: "number"
    description: "Optional HTTP-style status code."
  details:
    kind: "literal"
    type: "object"
    description: "Optional structured error details."
  hint:
    kind: "template"
    type: "string"
    description: "Optional remediation hint template."
hooks:
  file: "throw.hooks.js"
implementation:
  runtime: "rhino"
  file: "throw.js"
