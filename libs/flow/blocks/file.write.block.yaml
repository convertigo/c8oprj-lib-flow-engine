version: 1
name: "file.write"
icon: "mdi:file-document-edit-outline"
kind: "resource"
description: "Writes text to a file writer handle."
props:
  writer:
    label: "writer"
    kind: "expression"
    type: "handle<file.writer>"
    default: "local.writer"
    description: "Writer handle produced by file.withWriter."
  value:
    label: "value"
    kind: "value"
    type: "unknown"
    default: ""
    description: "Value written to the file."
  newline:
    label: "newline"
    kind: "literal"
    type: "boolean"
    default: false
    description: "Append a newline after the value."
  flush:
    label: "flush"
    kind: "literal"
    type: "boolean"
    default: false
    description: "Flush the writer after this write."
hooks:
  file: "file.write.hooks.js"
implementation:
  runtime: "rhino"
  file: "file.write.js"
