version: 1
private: true
icon: "mdi:puzzle-search-outline"
tags:
- block
- code
- flowscript
description: "Reads a FlowScript block, or returns a FlowScript mirror for a descriptor-backed Flow block."
props:
  name:
    label: "name"
    kind: "text"
    type: "string"
    description: "Flow block name."
  includeSources:
    label: "includeSources"
    kind: "literal"
    type: "boolean"
    default: false
    description: "Also include descriptorSource and implementationSource."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving block code."
hooks:
  file: "block.code.get.hooks.js"
implementation:
  runtime: "rhino"
  file: "block.code.get.js"
