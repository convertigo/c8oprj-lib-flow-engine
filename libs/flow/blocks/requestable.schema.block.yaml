version: 1
private: true
icon: "mdi:database-search-outline"
tags:
- requestable
- schema
- sequence
- transaction
- flow
description: "Returns the known output schema and paths for a requestable."
props:
  requestable:
    label: "requestable"
    kind: "requestable"
    type: "requestable"
    description: "Target requestable, for example RSSConnector.GetFeed, .MyFlow or Project.Connector.Transaction."
  project:
    label: "project"
    kind: "text"
    type: "string"
    description: "Project used to resolve local requestables."
  input:
    label: "input"
    kind: "template"
    type: "object"
    description: "Optional input variables when learn is true."
  learn:
    label: "learn"
    kind: "literal"
    type: "boolean"
    default: false
    description: "When no static schema is available, execute the requestable and infer schema from the runtime sample. Use only when the call is safe."
  includeSample:
    label: "includeSample"
    kind: "literal"
    type: "boolean"
    default: false
    description: "Include the runtime sample when learn is true."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving schema and paths."
hooks:
  file: "requestable.schema.hooks.js"
implementation:
  runtime: "rhino"
  file: "requestable.schema.js"
