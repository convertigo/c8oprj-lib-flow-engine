version: 1
name: "flow.context"
private: true
icon: "mdi:graph-outline"
package: "core"
namespace: "flow"
description: "Returns visible scope paths at a Flow node."
props:
  name:
    label: "name"
    kind: "text"
    type: "string"
    description: "Project Flow sidecar name."
  flowName:
    label: "flowName"
    kind: "text"
    type: "string"
    description: "Alias for name."
  flowSource:
    label: "flowSource"
    kind: "text"
    type: "string"
    description: "Flow YAML source."
  definition:
    label: "definition"
    kind: "literal"
    type: "object"
    description: "Flow definition object."
  node:
    label: "node"
    kind: "text"
    type: "string"
    description: "Target node id."
  path:
    label: "path"
    kind: "text"
    type: "string"
    description: "Target virtual tree path."
  property:
    label: "property"
    kind: "text"
    type: "string"
    description: "Target property name."
  mode:
    label: "mode"
    kind: "text"
    type: "string"
    description: "Picker mode: read or write."
  include:
    label: "include"
    kind: "literal"
    type: "array"
    description: "Optional scope roots to include, such as flow or current."
  detail:
    label: "detail"
    kind: "text"
    type: "string"
    description: "normal or compact."
  projectDir:
    label: "projectDir"
    kind: "text"
    type: "string"
    description: "Optional project directory override."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    description: "Scope path receiving visible paths."
implementation:
  runtime: "rhino"
  file: "flow.context.js"
