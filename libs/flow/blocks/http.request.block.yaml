version: 1
icon: "mdi:web"
description: "Calls an HTTP endpoint with method, query, headers and optional body."
props:
  method:
    kind: "text"
    type: "string"
    default: "GET"
    description: "HTTP method to use."
  url:
    kind: "template"
    type: "string"
    default: ""
    description: "HTTP URL template to call."
  query:
    kind: "template"
    type: "object"
    description: "Optional query parameters object."
  headers:
    kind: "template"
    type: "object"
    description: "Optional HTTP headers object."
  body:
    kind: "expression"
    type: "unknown"
    description: "Optional request body expression."
  out:
    kind: "path"
    mode: "write"
    default: "local.response"
    description: "Scope path receiving status, contentType, body and text."
outputs:
  out:
    type: "object"
    properties:
      status:
        type: "integer"
      contentType:
        type: "string"
      body:
        type: "unknown"
      text:
        type: "string"
hooks:
  file: "http.request.hooks.js"
implementation:
  runtime: "rhino"
  file: "http.request.js"
