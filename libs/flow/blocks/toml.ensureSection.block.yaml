version: 1
icon: "mdi:file-cog-outline"
tags:
- resource
description: "Ensures a simple TOML section contains key/value pairs."
longDescription: "Creates or updates one TOML section while preserving the rest of the file. Values support strings, numbers and booleans."
props:
  path:
    label: "path"
    kind: "template"
    type: "string"
    default: "~/config.toml"
    description: "TOML file path."
  section:
    label: "section"
    kind: "template"
    type: "string"
    default: "section"
    description: "TOML section name without brackets."
  values:
    label: "values"
    kind: "template"
    type: "object"
    default: {}
    description: "Object of key/value pairs to set in the section."
  dryRun:
    label: "dryRun"
    kind: "expression"
    type: "boolean"
    default: false
    description: "Preview the patch without writing the file."
  out:
    label: "out"
    kind: "path"
    mode: "write"
    default: "flow.toml"
    description: "Scope path receiving patch status."
hooks:
  file: "toml.ensureSection.hooks.js"
implementation:
  runtime: "rhino"
  file: "toml.ensureSection.js"
