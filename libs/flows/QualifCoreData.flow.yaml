version: 1
nodes:
  - id: sourceProfile
    block: set
    path: local.profile
    value:
      city: Paris
      metrics:
        temperature: 38
        unit: C
  - id: pickFields
    block: object.pick
    source: local.profile
    keys:
      - city
      - metrics.temperature
    out: local.selected
  - id: mergeAlert
    block: object.merge
    target: local.selected
    source:
      alert: true
    out: result.payload
  - id: stringify
    block: json.stringify
    value: "{{ result.payload }}"
    out: local.payloadText
  - id: parse
    block: json.parse
    text: "{{ local.payloadText }}"
    out: result.roundtrip
