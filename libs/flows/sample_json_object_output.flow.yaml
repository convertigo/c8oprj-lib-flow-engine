version: 1
nodes:
- id: "source"
  block: "set"
  path: "local.news"
  value:
    title: "Flow samples are executable"
    count: 3
- id: "response"
  block: "json.object"
  out: "result.payload"
  fields:
  - id: "title"
    block: "json.field"
    key: "title"
    value: "{{ local.news.title }}"
  - id: "count"
    block: "json.field"
    key: "count"
    value: "{{ local.news.count }}"
  - id: "status"
    block: "json.field"
    key: "status"
    value: "ok"
